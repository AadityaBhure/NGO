<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js" defer></script>
</head>

<body onload="initDashboard()">

  <!-- Logout -->
  <button class="logout-btn" onclick="logout()">Logout</button>

  <!-- Welcome -->
  <h2 id="welcomeText" style="text-align:center; margin-top:20px;"></h2>

  <!-- Name Modal -->
  <div id="nameModal" class="modal">
    <div class="modal-content">
      <h3>Enter Your Name</h3>
      <input id="nameInput" placeholder="Your Name">
      <button onclick="saveName()">Save</button>
    </div>
  </div>

  <div class="dashboard">

    <!-- INPUT -->
    <div class="card">
      <h2>Input</h2>

      <input id="age" type="number" placeholder="Age">

      <select id="gender">
        <option value="">Gender</option>
        <option>Male</option>
        <option>Female</option>
      </select>

      <select id="stress">
        <option value="">Stress</option>
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>

      <input id="sleep" type="number" placeholder="Sleep Hours">

      <select id="anxiety">
        <option value="">Anxiety</option>
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>

      <input id="mood" placeholder="Mood">

      <button onclick="predictMentalHealth()">Predict</button>
    </div>

    <!-- GRAPHS -->
    <div class="chart-box">
      <h2>Current</h2>
      <canvas id="chart"></canvas>

      <h2 style="margin-top:30px;">History</h2>
      <canvas id="historyChart"></canvas>
    </div>

  </div>

</body>
</html>
